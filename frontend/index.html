<!doctype html>
<html lang="en">
  <head>
    <meta charset="utf-8" />
    <meta name="viewport" content="width=device-width, initial-scale=1" />
    <title>North Star Gear | Support Bot Demo</title>
    <script>
      if ("scrollRestoration" in window.history) {
        window.history.scrollRestoration = "manual";
      }

      window.scrollTo(0, 0);
      window.addEventListener("pageshow", () => window.scrollTo(0, 0));
      window.addEventListener("load", () => window.scrollTo(0, 0));
    </script>
    <link rel="stylesheet" href="/static/css/base.css?v=20260623-15" />
    <link rel="stylesheet" href="/static/css/storefront.css?v=20260623-15" />
    <link rel="stylesheet" href="/static/css/support-widget.css?v=20260623-15" />
  </head>
  <body>
    <header class="site-header">
      <div class="brand-stack" aria-label="North Star Gear">
        <h1>North Star Support Bot Demo</h1>
        <details class="response-details-nav">
          <summary>Response details</summary>
          <pre id="debug-output">No messages yet.</pre>
        </details>
      </div>
    </header>

    <main>
      <section class="demo-layout" aria-label="Support bot demo overview">
        <aside class="demo-card" aria-label="Demo coverage tracker">
          <h2>Demo tracker</h2>
          <ul id="scenario-list" class="scenario-list"></ul>
        </aside>
      </section>
    </main>

    <div id="support-nudge" class="support-nudge" hidden>
      Need help? Our support bot is here.
    </div>

    <button id="support-launcher" class="support-launcher" type="button" aria-controls="support-widget" aria-expanded="false">
      <span>Support</span>
      <strong>Chat with us</strong>
    </button>

    <section id="support-widget" class="support-widget" aria-label="North Star support chat" hidden>
      <header class="widget-header">
        <div>
          <p class="eyebrow">North Star customer support</p>
        </div>
        <button id="close-support" type="button" aria-label="Close support chat">Close</button>
      </header>

      <div id="message-list" class="message-list" aria-live="polite"></div>
      <div id="quick-actions" class="quick-actions" aria-label="Quick demo actions"></div>

      <form id="chat-form" class="chat-form">
        <label class="sr-only" for="message-input">Message</label>
        <input
          id="message-input"
          name="message"
          type="text"
          autocomplete="off"
          placeholder="Type a message, like 'Where is my order?'"
          required
        />
        <button type="submit">Send</button>
      </form>
    </section>

    <script src="/static/js/scenarios.js?v=20260623-15"></script>
    <script src="/static/js/api.js?v=20260623-15"></script>
    <script src="/static/js/render.js?v=20260623-15"></script>
    <script src="/static/js/support-widget.js?v=20260623-15"></script>
    <script src="/static/js/chat.js?v=20260623-15"></script>
  </body>
</html>
